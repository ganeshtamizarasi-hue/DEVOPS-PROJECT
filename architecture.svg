<svg viewBox="0 0 1060 700" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI',system-ui,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#060d1f"/><stop offset="100%" style="stop-color:#0b1530"/>
    </linearGradient>
    <linearGradient id="gEC2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0d2010"/><stop offset="100%" style="stop-color:#081508"/>
    </linearGradient>
    <linearGradient id="gCard" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#111f3a"/><stop offset="100%" style="stop-color:#0a1628"/>
    </linearGradient>
    <linearGradient id="gK8s" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1e3a"/><stop offset="100%" style="stop-color:#061226"/>
    </linearGradient>
    <linearGradient id="gTf" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1a0a"/><stop offset="100%" style="stop-color:#060e06"/>
    </linearGradient>
    <filter id="cs"><feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000" flood-opacity="0.55"/></filter>
    <marker id="ab" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M1,1 L1,8 L8,4.5 z" fill="#3b82f6"/>
    </marker>
    <marker id="ag" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M1,1 L1,8 L8,4.5 z" fill="#22c55e"/>
    </marker>
    <marker id="ao" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M1,1 L1,8 L8,4.5 z" fill="#f59e0b"/>
    </marker>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0L0 0 0 44" fill="none" stroke="#fff" stroke-width="0.12" opacity="0.07"/>
    </pattern>
    <radialGradient id="cg" cx="50%" cy="40%" r="55%">
      <stop offset="0%" style="stop-color:#1d4ed8;stop-opacity:0.06"/>
      <stop offset="100%" style="stop-color:#000;stop-opacity:0"/>
    </radialGradient>
