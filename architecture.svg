  <rect x="680" y="472" width="150" height="84" rx="8" fill="#0a1628" stroke="#3b82f6" stroke-width="1"/>
  <text x="755" y="493" text-anchor="middle" font-size="10" font-weight="700" fill="#93c5fd">DEPLOYMENT</text>
  <text x="755" y="510" text-anchor="middle" font-size="9" fill="#60a5fa">replicas: 2</text>
  <text x="755" y="525" text-anchor="middle" font-size="9" fill="#6b7280">RollingUpdate</text>
  <text x="755" y="540" text-anchor="middle" font-size="9" fill="#6b7280">Liveness Probe</text>
  <text x="755" y="555" text-anchor="middle" font-size="9" fill="#6b7280">Readiness Probe</text>

  <!-- Service -->
  <rect x="842" y="472" width="166" height="84" rx="8" fill="#0a1628" stroke="#3b82f6" stroke-width="1"/>
  <text x="925" y="493" text-anchor="middle" font-size="10" font-weight="700" fill="#93c5fd">SERVICE</text>
  <text x="925" y="510" text-anchor="middle" font-size="9" fill="#60a5fa">LoadBalancer  :80</text>
  <text x="925" y="525" text-anchor="middle" font-size="9" fill="#6b7280">AWS ELB</text>
  <text x="925" y="540" text-anchor="middle" font-size="9" fill="#6b7280">External Traffic</text>
  <text x="925" y="555" text-anchor="middle" font-size="9" fill="#6b7280">Port 80 → 80</text>

  <!-- HPA -->
  <rect x="680" y="568" width="328" height="76" rx="8" fill="#060e20" stroke="#2563eb" stroke-width="0.8" stroke-dasharray="4,3"/>
  <text x="844" y="588" text-anchor="middle" font-size="10" font-weight="700" fill="#60a5fa">HORIZONTAL POD AUTOSCALER (HPA)</text>
  <text x="844" y="606" text-anchor="middle" font-size="9" fill="#3b82f6">Min: 2 pods  ·  Max: 6 pods  ·  CPU Target: 60%</text>
  <text x="844" y="622" text-anchor="middle" font-size="9" fill="#475569">Resource Limits  ·  Auto Scale on Load</text>
  <text x="844" y="636" text-anchor="middle" font-size="9" fill="#475569">Non-root Container  ·  HEALTHCHECK</text>

  <!-- Arrow K8s → End User -->
  <line x1="925" y1="658" x2="925" y2="680" stroke="#22c55e" stroke-width="2" marker-end="url(#ag)"/>

  <!-- Pipeline stages left -->
  <rect x="28" y="194" width="344" height="308" rx="12" fill="#07101e" stroke="#1e3a5f" stroke-width="1.2"/>
  <rect x="28" y="194" width="344" height="28" rx="12" fill="#0f2044"/>
  <rect x="28" y="210" width="344" height="12" fill="#0f2044"/>
  <text x="48" y="213" font-size="10" font-weight="700" fill="#60a5fa" letter-spacing="1.5">CI/CD PIPELINE  —  13 STAGES</text>

  <text x="42" y="240" font-size="10" fill="#22c55e">①</text><text x="58" y="240" font-size="10" fill="#94a3b8">Pull Code from GitHub</text>
  <text x="42" y="258" font-size="10" fill="#22c55e">②</text><text x="58" y="258" font-size="10" fill="#94a3b8">Terraform Init</text><text x="282" y="258" font-size="9" fill="#475569">RUN_TERRAFORM=true</text>
  <text x="42" y="276" font-size="10" fill="#22c55e">③</text><text x="58" y="276" font-size="10" fill="#94a3b8">Terraform Plan</text>
  <text x="42" y="294" font-size="10" fill="#22c55e">④</text><text x="58" y="294" font-size="10" fill="#94a3b8">Terraform Apply</text>
  <text x="42" y="312" font-size="10" fill="#22c55e">⑤</text><text x="58" y="312" font-size="10" fill="#94a3b8">Terraform Destroy</text><text x="282" y="312" font-size="9" fill="#ef4444">manual confirm</text>
  <text x="42" y="330" font-size="10" fill="#22c55e">⑥</text><text x="58" y="330" font-size="10" fill="#94a3b8">SonarQube Analysis</text>
  <text x="42" y="348" font-size="10" fill="#ef4444">⑦</text><text x="58" y="348" font-size="10" fill="#94a3b8">Quality Gate</text><text x="282" y="348" font-size="9" fill="#ef4444">blocks on fail</text>
  <text x="42" y="366" font-size="10" fill="#22c55e">⑧</text><text x="58" y="366" font-size="10" fill="#94a3b8">Build Docker Image</text>
  <text x="42" y="384" font-size="10" fill="#22c55e">⑨</text><text x="58" y="384" font-size="10" fill="#94a3b8">Trivy Image Scan</text><text x="282" y="384" font-size="9" fill="#475569">report archived</text>
  <text x="42" y="402" font-size="10" fill="#22c55e">⑩</text><text x="58" y="402" font-size="10" fill="#94a3b8">Push to AWS ECR</text>
  <text x="42" y="420" font-size="10" fill="#22c55e">⑪</text><text x="58" y="420" font-size="10" fill="#94a3b8">Deploy to Kubernetes</text>
  <text x="42" y="438" font-size="10" fill="#22c55e">⑫</text><text x="58" y="438" font-size="10" fill="#94a3b8">Smoke Test</text>
  <text x="42" y="456" font-size="10" fill="#22c55e">⑬</text><text x="58" y="456" font-size="10" fill="#94a3b8">Email Notification  (Gmail SMTP)</text>
  <line x1="40" y1="468" x2="358" y2="468" stroke="#1e3a5f" stroke-width="1"/>
  <text x="48" y="484" font-size="9" fill="#475569">Params:  RUN_TERRAFORM  ·  TERRAFORM_DESTROY</text>
  <text x="48" y="498" font-size="9" fill="#475569">Notifications: SUCCESS / FAILURE  via Gmail</text>

  <!-- Legend -->
  <rect x="28" y="658" width="622" height="34" rx="8" fill="#07101e" stroke="#1e3a5f" stroke-width="1"/>
  <circle cx="52" cy="675" r="5" fill="#3b82f6"/><text x="64" y="679" font-size="10" fill="#94a3b8">CI/CD Flow</text>
  <circle cx="150" cy="675" r="5" fill="#22c55e"/><text x="162" y="679" font-size="10" fill="#94a3b8">Deploy</text>
  <circle cx="228" cy="675" r="5" fill="#f59e0b"/><text x="240" y="679" font-size="10" fill="#94a3b8">Image Push</text>
  <circle cx="330" cy="675" r="5" fill="#8b5cf6"/><text x="342" y="679" font-size="10" fill="#94a3b8">Monitoring</text>
  <circle cx="428" cy="675" r="5" fill="#ef4444"/><text x="440" y="679" font-size="10" fill="#94a3b8">Security</text>
  <circle cx="510" cy="675" r="5" fill="#22c55e"/><text x="522" y="679" font-size="10" fill="#94a3b8">Terraform IaC</text>

  <!-- End User -->
  <rect x="860" y="658" width="172" height="36" rx="8" fill="#071a0f" stroke="#22c55e" stroke-width="1.2"/>
  <text x="946" y="676" text-anchor="middle" font-size="11" font-weight="700" fill="#34d399">🌐  End User</text>
  <text x="946" y="690" text-anchor="middle" font-size="9" fill="#16a34a">http://LOAD-BALANCER-URL</text>

</svg>
