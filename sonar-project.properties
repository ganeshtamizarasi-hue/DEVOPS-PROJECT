sonar.projectKey=k8-fastapi-project
sonar.projectName=K8 FastAPI Project
sonar.projectVersion=1.0

# Source
sonar.sources=.
sonar.language=py
sonar.sourceEncoding=UTF-8

# Exclusions – skip non-application files
sonar.exclusions=**/__pycache__/**,**/*.pyc,**/tests/**,Dockerfile,requirements.txt

# Python-specific
sonar.python.version=3.11

# Coverage report (generate with: pytest --cov=. --cov-report=xml)
# sonar.python.coverage.reportPaths=coverage.xml
